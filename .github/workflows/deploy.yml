name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}-backend

jobs:
  # run tests before deploy.
  test:
    if: github.event_name == 'push'
    runs-on: [self-hosted, chessrepeat-vps]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: vet
        working-directory: backend
        run: go vet ./...
      - name: test
        working-directory: backend
        run: go test ./...

  build-and-push:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  deploy:
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: [self-hosted, chessrepeat-vps]
    steps:
      - uses: actions/checkout@v4
      - name: stage compose files into deploy dir
        run: |
          set -euo pipefail
          install -d "${{ secrets.VPS_PATH }}"
          cp docker-compose.yml "${{ secrets.VPS_PATH }}/"
          cp backend/schema.sql "${{ secrets.VPS_PATH }}/"
          # The db-backup service bind-mounts this; ship it alongside
          # compose (install -m preserves the executable bit).
          install -m 0755 healthcheck-ping.sh "${{ secrets.VPS_PATH }}/"
      - name: pull image and restart
        run: |
          set -euo pipefail
          cd "${{ secrets.VPS_PATH }}"
          echo "${{ secrets.GHCR_PULL_TOKEN }}" \
            | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
      - name: smoke test
        run: |
          # Give Caddy a moment to swap upstreams, then check the API
          # is reachable from the public internet.
          sleep 5
          curl -fsS --max-time 10 https://${{ secrets.API_HOSTNAME }}/healthz \
            || (echo "smoke test failed — check 'docker compose logs' on the VPS"; exit 1)
