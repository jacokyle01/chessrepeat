server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unmatched path serves index.html so React
    # Router (or whatever client-side router) can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets; index.html itself stays uncached so a
    # new deploy is picked up immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
